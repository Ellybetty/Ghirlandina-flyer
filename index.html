<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Documenti</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 15px;
            text-decoration: none;
            color: white;
            background: #0078d7;
            border-radius: 8px;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #005fa3;
        }

        .spagnolo {
            background: #d9534f;
        }

        .spagnolo:hover {
            background: #c9302c;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Scarica il documento</h1>

    <a class="btn" href="ITA_FLYER_QRCODE (1).pdf" download>
        🇮🇹 Scarica PDF Italiano
    </a>

    <a class="btn spagnolo" href="ES_FLYER_QRCODE.pdf" download>
        🇪🇸 Descargar PDF Español
    </a>
</div>

</body>
</html>
